<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Iframe Proxy</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { 
    margin: 0;
    background-color: rgb(17, 24, 39); 
    font-family: Poppins, sans-serif; 
    color-scheme: dark; 
  }
  #loadingSpinner {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 100;
  }
  .spinner {
    border: 4px solid rgba(255, 255, 255, 0.3);
    border-top: 4px solid #fff;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body>
    <div class="h-screen overflow-y-auto" style="display:block;width:100%;height:100vh;overflow:auto">
        <div class="min-h-screen" style="display:block;width:100%;min-height:100vh">
            <nav id="main-navbar" class="py-4 border-b" style="border-bottom:1px solid rgb(41, 51, 65);display:block;width:100%;padding:16px 0px">
                <div class="max-w-7xl flex items-center mx-auto px-4 gap-4" style="display:flex;width:100%;max-width:1280px;align-items:center;padding:0 16px">
                    <h1 style="color:rgb(255, 255, 255);font-size:24px;font-weight:800;margin:0">🔗 Iframe Proxy</h1>
                </div>
            </nav>

            <div class="my-4 px-4" style="display:block;width:100%;margin:16px 0px;padding:0 16px">
                <div class="max-w-7xl mx-auto" style="max-width:1280px;margin:0 auto">
                    <div style="display:flex;flex-direction:column;gap:24px">
                        
                        <div class="bg-gray-800 rounded-lg p-6" style="background:rgb(31, 41, 55);border-radius:8px;padding:24px">
                            <h2 class="text-2xl font-bold text-white mb-4" style="color:rgb(255, 255, 255);font-size:24px;font-weight:700;margin-bottom:16px">
                                Load Any URL in Iframe
                            </h2>
                            <p class="text-gray-400 mb-6" style="color:rgb(156, 163, 175);margin-bottom:24px">
                                Enter any URL to load it in an iframe (bypasses X-Frame-Options)
                            </p>
                            
                            <div class="flex gap-2" style="display:flex;gap:8px;flex-wrap:wrap">
                                <input 
                                  id="urlInput" 
                                  type="text" 
                                  placeholder="https://example.com" 
                                  class="flex-1 rounded-md px-4 py-2 bg-gray-700 text-white"
                                  style="flex:1;border-radius:6px;padding:8px 16px;background:rgb(55, 65, 81);color:rgb(255, 255, 255);font-size:14px;border:none;min-width:200px"
                                  value="https://bloxlink.pw/verify?username=test"
                                />
                                <button 
                                  id="loadBtn" 
                                  onclick="loadUrl()"
                                  class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-md"
                                  style="background:rgb(59, 130, 246);padding:8px 24px;border-radius:6px;color:rgb(255, 255, 255);font-weight:600;border:none;cursor:pointer"
                                >
                                  Load
                                </button>
                            </div>
                        </div>

                        <div class="bg-gray-800 rounded-lg overflow-hidden" style="background:rgb(31, 41, 55);border-radius:8px;overflow:hidden">
                            <div class="bg-gray-700 px-4 py-3 border-b border-gray-600" style="background:rgb(55, 65, 81);padding:12px 16px;border-bottom:1px solid rgb(75, 85, 99)">
                                <p class="text-sm text-gray-400" style="color:rgb(156, 163, 175);font-size:14px;margin:0">
                                  URL: <span id="currentUrl" class="text-blue-400" style="color:rgb(96, 165, 250)">Loading...</span>
                                </p>
                            </div>
                            <div class="relative" style="position:relative;width:100%;height:600px;overflow:hidden;background:rgb(255,255,255)">
                              <div id="loadingSpinner" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100">
                                <div class="spinner" style="border:4px solid rgba(0, 0, 0, 0.1);border-top:4px solid #333;border-radius:50%;width:40px;height:40px"></div>
                              </div>
                              <iframe 
                                id="contentIframe" 
                                style="width:100%;height:100%;border:none;display:block"
                                sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-presentation allow-top-navigation"
                              ></iframe>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const loadBtn = document.getElementById('loadBtn');
        const iframe = document.getElementById('contentIframe');
        const currentUrlDisplay = document.getElementById('currentUrl');
        const loadingSpinner = document.getElementById('loadingSpinner');

        function loadUrl() {
            const userUrl = urlInput.value.trim();
            
            if (!userUrl) {
                alert('Please enter a URL');
                return;
            }

            if (!userUrl.startsWith('http://') && !userUrl.startsWith('https://')) {
                alert('URL must start with http:// or https://');
                return;
            }

            loadingSpinner.style.display = 'block';
            loadBtn.disabled = true;
            loadBtn.style.opacity = '0.6';
            currentUrlDisplay.textContent = 'Loading...';

            try {
                const proxyUrl = `/api/iframe-proxy?url=${encodeURIComponent(userUrl)}`;
                
                iframe.onload = function() {
                    loadingSpinner.style.display = 'none';
                    loadBtn.disabled = false;
                    loadBtn.style.opacity = '1';
                    currentUrlDisplay.textContent = userUrl;
                };

                iframe.onerror = function() {
                    loadingSpinner.style.display = 'none';
                    loadBtn.disabled = false;
                    loadBtn.style.opacity = '1';
                    currentUrlDisplay.textContent = 'Error loading URL';
                    alert('Failed to load URL');
                };

                iframe.src = proxyUrl;

                setTimeout(() => {
                    if (loadingSpinner.style.display !== 'none') {
                        loadingSpinner.style.display = 'none';
                        loadBtn.disabled = false;
                        loadBtn.style.opacity = '1';
                    }
                }, 10000);
            } catch (error) {
                console.error('Error:', error);
                loadingSpinner.style.display = 'none';
                loadBtn.disabled = false;
                loadBtn.style.opacity = '1';
                currentUrlDisplay.textContent = 'Error: ' + error.message;
            }
        }

        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadUrl();
        });

        window.addEventListener('load', () => {
            loadUrl();
        });
    </script>
</body>
</html>
